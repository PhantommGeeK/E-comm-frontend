<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card add-product-card p-5 animate-fade-in">
        <div class="text-center mb-5">
          <div class="icon-circle mb-3 mx-auto">
            <i class="bi bi-box-seam text-primary h3"></i>
          </div>
          <h2 class="fw-bold">Add New Product</h2>
          <p class="text-muted">Fill in the details below to add a new item to your store.</p>
        </div>

        <form (ngSubmit)="addProduct()">
          <div class="row g-4">
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control rounded-4" id="name" [(ngModel)]="product.name" name="name" placeholder="Product Name" required>
                <label for="name">Product Name</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control rounded-4" id="brand" [(ngModel)]="product.brand" name="brand" placeholder="Brand" required>
                <label for="brand">Brand</label>
              </div>
            </div>

            <div class="col-md-4">
              <div class="form-floating mb-3">
                <input type="number" class="form-control rounded-4" id="price" [(ngModel)]="product.price" name="price" placeholder="Price" required>
                <label for="price">Price (₹)</label>
              </div>
            </div>

            <div class="col-md-4">
              <div class="form-floating mb-3">
                <input type="text" class="form-control rounded-4" id="category" [(ngModel)]="product.category" name="category" placeholder="Category" required>
                <label for="category">Category</label>
              </div>
            </div>

            <div class="col-md-4">
              <div class="form-floating mb-3">
                <input type="number" class="form-control rounded-4" id="quantity" [(ngModel)]="product.quantity" name="quantity" placeholder="Quantity" required>
                <label for="quantity">Quantity</label>
              </div>
            </div>

            <div class="col-12">
              <div class="form-floating mb-3">
                <textarea class="form-control rounded-4" id="description" [(ngModel)]="product.description" name="description" placeholder="Description" style="height: 120px"></textarea>
                <label for="description">Detailed Description</label>
              </div>
            </div>

            <div class="col-12">
              <div class="form-check form-switch custom-switch mb-4">
                <input type="checkbox" class="form-check-input" id="available" [(ngModel)]="product.available" name="available">
                <label class="form-check-label ms-2" for="available">Product is currently available in stock</label>
              </div>
            </div>

            <div class="col-12">
              <label for="imageFile" class="form-label fw-semibold">Product Image</label>
              <input
                id="imageFile"
                type="file"
                class="form-control rounded-4"
                accept="image/*"
                name="imageFile"
                (change)="onImageSelected($event)"
                required
              >
              <div class="form-text">
                Upload an image smaller than 1 MB. Larger images will be optimized automatically when possible.
              </div>
              <div class="form-text text-primary" *ngIf="imageStatusMessage">{{ imageStatusMessage }}</div>
            </div>

            <div class="col-12" *ngIf="imagePreviewUrl">
              <div class="border rounded-4 p-3 bg-light">
                <p class="fw-semibold mb-3">Image Preview</p>
                <img
                  [src]="imagePreviewUrl"
                  alt="Selected product preview"
                  class="img-fluid rounded-4 shadow-sm"
                  style="max-height: 280px; object-fit: cover;"
                >
              </div>
            </div>

            <div class="col-12 d-grid gap-3 d-sm-flex">
              <button class="btn btn-primary btn-lg flex-grow-1" type="submit" [disabled]="processingImage">
                <i class="bi bi-cloud-arrow-up me-2"></i>
                {{ processingImage ? 'Preparing Image...' : 'Save Product' }}
              </button>
              <button class="btn btn-outline-secondary btn-lg px-4" type="button" routerLink="/">
                Cancel
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
