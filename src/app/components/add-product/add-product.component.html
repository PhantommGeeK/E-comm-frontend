<div class="container py-4 py-lg-5">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <section class="paper-panel p-4 p-lg-5 newsprint-texture">
        <div class="border-bottom border-dark pb-4 mb-4">
          <p class="section-label mb-2">Editorial Desk | New Listing</p>
          <h2 class="mb-2">Add New Product</h2>
          <p class="text-muted mb-0">Fill in the details below to publish a fresh inventory entry.</p>
        </div>

        <form (ngSubmit)="addProduct()" novalidate>
          <div class="alert" *ngIf="validationMessage">{{ validationMessage }}</div>
          <div class="row g-4">
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="name" [(ngModel)]="product.name" name="name" placeholder="Product Name" required minlength="2">
                <label for="name">Product Name</label>
              </div>
            </div>

            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="brand" [(ngModel)]="product.brand" name="brand" placeholder="Brand" required minlength="2">
                <label for="brand">Brand</label>
              </div>
            </div>

            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" class="form-control" id="price" [(ngModel)]="product.price" name="price" placeholder="Price" min="1" step="0.01" required>
                <label for="price">Price (INR)</label>
              </div>
            </div>

            <div class="col-md-4">
              <div class="form-floating">
                <input type="text" class="form-control" id="category" [(ngModel)]="product.category" name="category" placeholder="Category" required minlength="2">
                <label for="category">Category</label>
              </div>
            </div>

            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" class="form-control" id="quantity" [(ngModel)]="product.quantity" name="quantity" placeholder="Quantity" min="0" step="1" required>
                <label for="quantity">Quantity</label>
              </div>
            </div>

            <div class="col-12">
              <div class="form-floating">
                <textarea class="form-control" id="description" [(ngModel)]="product.description" name="description" placeholder="Description" style="height: 120px" required minlength="10"></textarea>
                <label for="description">Detailed Description</label>
              </div>
            </div>

            <div class="col-12">
              <div class="form-check form-switch mb-2">
                <input type="checkbox" class="form-check-input" id="available" [(ngModel)]="product.available" name="available">
                <label class="form-check-label ms-2" for="available">Product is currently available in stock</label>
              </div>
            </div>

            <div class="col-12">
              <label for="imageFile" class="section-label d-block mb-2">Product Image</label>
              <input id="imageFile" type="file" class="form-control" accept="image/*" name="imageFile" (change)="onImageSelected($event)" required>
              <div class="meta-line mt-2">Upload an image smaller than 1 MB. Larger images may be optimized.</div>
              <div class="meta-line mt-1 text-danger" *ngIf="imageStatusMessage">{{ imageStatusMessage }}</div>
            </div>

            <div class="col-12" *ngIf="imagePreviewUrl">
              <div class="preview-panel p-3">
                <p class="section-label mb-3">Image Preview | Fig. 3.1</p>
                <img [src]="imagePreviewUrl" alt="Selected product preview" class="img-fluid preview-image" style="max-height: 280px; object-fit: cover;">
              </div>
            </div>

            <div class="col-12 d-grid gap-3 d-sm-flex">
              <button class="btn btn-primary px-4 flex-grow-1" type="submit" [disabled]="processingImage">
                {{ processingImage ? 'Preparing Image...' : 'Save Product' }}
              </button>
              <button class="btn btn-outline-secondary px-4" type="button" routerLink="/">Cancel</button>
            </div>
          </div>
        </form>
      </section>
    </div>
  </div>
</div>
