<div class="container mt-5">
  <div class="auth-shell mx-auto">
    <p class="eyebrow mb-2">Authentication</p>
    <h1 class="mb-2">Welcome Back</h1>
    <p class="text-muted mb-4">Login to place orders and manage your cart securely.</p>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <label class="form-label">Username</label>
      <input
        class="form-control"
        type="text"
        name="username"
        [(ngModel)]="username"
        autocomplete="username">

      <label class="form-label mt-3">Password</label>
      <input
        class="form-control"
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="current-password">

      <button class="btn btn-primary w-100 mt-4" type="submit" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="text-muted mt-3 mb-0 text-center">
      New here?
      <a routerLink="/signup" class="fw-semibold">Create an account</a>
    </p>
  </div>
</div>
