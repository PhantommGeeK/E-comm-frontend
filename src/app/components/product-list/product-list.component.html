<div class="container mt-5">
  <div class="header-section text-center mb-5">
    <h1 class="display-4 fw-bold">Explore Our Products</h1>
    <p class="text-muted lead">Premium quality products curated just for you.</p>
    <div class="underline mx-auto"></div>
  </div>

  <div class="row g-4">
    <div class="col-xl-3 col-lg-4 col-md-6" *ngFor="let p of products">
      <div class="card product-card h-100" (click)="viewProduct(p.id)">
        <div class="product-image-wrapper">
          <img [src]="getProductImage(p)"
               class="card-img-top"
               [alt]="p.name">
          <div class="product-overlay">
            <span class="btn btn-light btn-sm rounded-pill px-3">View Details</span>
          </div>
          <div class="category-badge">
            {{ p.category }}
          </div>
        </div>

        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title text-truncate mb-0" [title]="p.name">{{ p.name }}</h5>
          </div>
          <p class="brand-text mb-2">{{ p.brand }}</p>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="price-tag h5 mb-0">₹{{ p.price }}</span>
            <span class="stock-status" [ngClass]="p.available ? 'text-success' : 'text-danger'">
              <i class="bi" [ngClass]="p.available ? 'bi-check-circle-fill' : 'bi-x-circle-fill'"></i>
              {{ p.available ? 'In Stock' : 'Out' }}
            </span>
          </div>
        </div>

        <div class="card-footer bg-transparent border-0 pb-3">
          <button class="btn btn-primary w-100" (click)="$event.stopPropagation()">
            <i class="bi bi-cart-plus me-2"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="products.length === 0" class="text-center py-5">
    <div class="empty-state">
      <i class="bi bi-box-seam display-1 text-muted"></i>
      <h3 class="mt-3">No products found</h3>
      <p class="text-muted">Stay tuned! We'll be adding more products soon.</p>
    </div>
  </div>
</div>
