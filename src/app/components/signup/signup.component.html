<div class="container mt-5">
  <div class="auth-shell mx-auto">
    <p class="eyebrow mb-2">Authentication</p>
    <h1 class="mb-2">Create Account</h1>
    <p class="text-muted mb-4">Signup once and use your JWT session for secure checkout.</p>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <label class="form-label">Username</label>
      <input
        class="form-control"
        type="text"
        name="username"
        [(ngModel)]="username"
        autocomplete="username">

      <label class="form-label mt-3">Password</label>
      <input
        class="form-control"
        type="password"
        name="password"
        [(ngModel)]="password"
        autocomplete="new-password">

      <label class="form-label mt-3">Confirm Password</label>
      <input
        class="form-control"
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        autocomplete="new-password">

      <button class="btn btn-primary w-100 mt-4" type="submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Signup' }}
      </button>
    </form>

    <p class="text-muted mt-3 mb-0 text-center">
      Already have an account?
      <a routerLink="/login" class="fw-semibold">Login</a>
    </p>
  </div>
</div>
