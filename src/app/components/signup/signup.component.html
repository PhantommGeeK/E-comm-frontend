<div class="container py-4 py-lg-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <section class="paper-panel p-4 p-lg-5 newsprint-texture">
        <p class="section-label mb-2">Authentication Desk</p>
        <h1 class="mb-2">Create Account</h1>
        <p class="text-muted mb-4">Signup once and use your JWT session for secure checkout.</p>

        <div *ngIf="errorMessage" class="alert">{{ errorMessage }}</div>

        <form (ngSubmit)="onSubmit()" class="auth-form" novalidate>
          <label class="section-label d-block mb-2" for="signupUsername">Username</label>
          <input class="form-control" id="signupUsername" type="text" name="username" [(ngModel)]="username" #usernameModel="ngModel" autocomplete="username" required minlength="3">
          <small class="text-danger" *ngIf="submitted && usernameModel.invalid">Username is required (min 3 characters).</small>

          <label class="section-label d-block mb-2 mt-3" for="signupPassword">Password</label>
          <input class="form-control" id="signupPassword" type="password" name="password" [(ngModel)]="password" #passwordModel="ngModel" autocomplete="new-password" required minlength="6">
          <small class="text-danger" *ngIf="submitted && passwordModel.invalid">Password is required (min 6 characters).</small>

          <label class="section-label d-block mb-2 mt-3" for="signupConfirm">Confirm Password</label>
          <input class="form-control" id="signupConfirm" type="password" name="confirmPassword" [(ngModel)]="confirmPassword" #confirmPasswordModel="ngModel" autocomplete="new-password" required minlength="6">
          <small class="text-danger" *ngIf="submitted && confirmPasswordModel.invalid">Confirm password is required.</small>

          <button class="btn btn-primary w-100 mt-4" type="submit" [disabled]="loading">
            {{ loading ? 'Creating account...' : 'Signup' }}
          </button>
        </form>

        <p class="text-muted mt-3 mb-0 text-center">
          Already have an account?
          <a routerLink="/login" class="fw-semibold">Login</a>
        </p>
      </section>
    </div>
  </div>
</div>
